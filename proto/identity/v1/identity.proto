syntax = "proto3";

package identity.v1;

option go_package = "github.com/marginpilot/contracts/gen/identity/v1;identityv1";

// IdentityService resolves an opaque virtual API key into the tenant/customer
// it belongs to. The gateway calls it (with a local cache) to attribute usage.
service IdentityService {
  rpc Resolve(ResolveRequest) returns (ResolveResponse);
}

message ResolveRequest {
  string api_key = 1;
}

message ResolveResponse {
  bool found = 1;
  string tenant_id = 2;
  string customer_id = 3;
  string feature = 4;
}
